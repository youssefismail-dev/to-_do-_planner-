<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeekToDo Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ── SIDEBAR ── -->
  <nav id="sidebar">
    <div class="sb-logo">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none"
           stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <div class="sb-nav">
      <button class="sb-icon active" title="Week View">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>
      <button class="sb-icon" title="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>
      <button class="sb-icon" title="Sync">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
      </button>
      <button class="sb-icon" title="Recurring">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/>
          <path d="M3 11V9a4 4 0 014-4h14"/>
          <polyline points="7 23 3 19 7 15"/>
          <path d="M21 13v2a4 4 0 01-4 4H3"/>
        </svg>
      </button>
      <button class="sb-icon" title="Add List">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </button>
      <button class="sb-icon" title="Undo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 14 4 9 9 4"/>
          <path d="M20 20v-7a4 4 0 00-4-4H4"/>
        </svg>
      </button>
    </div>

    <div class="sb-bottom">
      <button class="sb-icon" title="What's New">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 12V22H4V12"/>
          <path d="M22 7H2v5h20V7z"/>
          <path d="M12 22V7"/>
          <path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/>
          <path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/>
        </svg>
      </button>
      <button class="sb-icon" title="About">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </button>
      <button class="sb-icon" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83
                   2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33
                   1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09
                   A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06
                   a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15
                   a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09
                   A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06
                   a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68
                   a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09
                   a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06
                   a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9
                   a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09
                   a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <div id="main">

    <!-- Week View -->
    <div id="week-view">
      <button class="nav-btn" id="prev-btn">&#8249;</button>
      <div id="day-columns"></div>
      <button class="nav-btn" id="next-btn">&#8250;</button>
    </div>

    <!-- Custom Lists -->
    <div id="custom-lists"></div>

  </div>
</div>

<!-- ── CONTEXT MENU ── -->
<div id="ctx-menu">
  <div class="ctx-section">
    <div class="ctx-label">Color</div>
    <div id="ctx-colors"></div>
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctx-time-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    Set time
  </div>
  <div class="ctx-item ctx-danger" id="ctx-delete-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14H6L5 6"/>
      <path d="M10 11v6M14 11v6"/>
      <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
    </svg>
    Delete task
  </div>
</div>

<!-- ── TIME MODAL ── -->
<div id="time-modal">
  <div class="modal-card">
    <h3>Set task time</h3>
    <input type="time" id="time-input" class="modal-time-input">
    <div class="modal-btns">
      <button class="btn-cancel" id="time-cancel">Cancel</button>
      <button class="btn-ok"     id="time-ok">Set Time</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script src="renderer.js"></script>
</body>
</html>
